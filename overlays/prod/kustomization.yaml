apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-prod
namePrefix: prod-

resources:
  - namespace.yaml
  - ../../base

images:
  - name: nginx
    newTag: 1.27-alpine

patches:
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: hello-kustomize
